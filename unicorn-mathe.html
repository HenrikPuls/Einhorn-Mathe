n Rammbourghini.","Fritzchen fragt: 'Kann man für etwas bestraft werden, was man nicht gemacht hat?' Lehrer: 'Nein.' Fritzchen: 'Gut – ich habe meine Hausaufgaben nicht gemacht.'","Treffen sich ein gekochtes Ei und ein Rührei. Sagt das Rührei: 'Ich bin heute so durcheinander!'","Was ergibt sieben mal sieben? 'Wie lange leben Fische?' – 'Genauso wie kurze!'","Warum brauchen Polizisten eine Schere? Damit sie Einbrechern den Weg abschneiden können.","Zwei Ballons in der Wüste. Sagt der eine: 'Vorsicht, ein Kaktusssssssss!'","Warum können Geister so schlecht lügen? Weil sie leicht zu durchschauen sind!","Kommt ein Frosch in den Supermarkt. Verkäufer: 'Was möchtest du?' Frosch: 'Quak.'","Was ist unsichtbar und stinkt nach Möhrchen? Ein Kaninchenfurz!","Wie nennt man einen Schäfer, der seine Schafe schlägt? Einen Schläfer.","Was ist bunt, liegt im Gras und ist gefährlich? Ein Messer, das sich als Osterei verkleidet hat.","Wie heißt ein Huhn am Nordpol? Kälteküken.","Was macht ein Pirat, wenn er 80 wird? Er sagt: 'Achtzig!'","Was sagt die Null zur Acht? 'Schöner Gürtel!'","In welcher Einheit messen Hunde die Temperatur? In Bel(l)grad!","Wohin geht ein Reh mit Haarausfall? In die Reh-Haar-Klinik!","Wie nennt man einen Cowboy ohne Pferd? Sattelschlepper!","Was liegt am Strand und ist schlecht zu verstehen? Eine Nuschel!","Wer ist glücklich und stinkt? Das Gefurztagskind.","Was ist der Lieblingsbuchstabe eines hungrigen Monsters? Das 'Mmmm'!","Wie lang ist ein Fußballfeld? Halb so lang wie zwei Fußballfelder.","Kleine Luisa beim Mittagessen: 'Ich will die Nudeln!' Mutter: 'Wie lautet das Zauberwort mit zwei t?' Luisa: 'Flott!'","Ein Junge fragt einen Wurm: 'Kannst du auch Musik machen?' Wurm: 'Klar – ich bin ein echter Ohrwurm!'"];// ─── Seeded PRNG (Mulberry32) ────────────────────────────────────────────────

let actx=null;function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();return actx;}function noteToHz(note){const notes={C:0,"C#":1,D:2,"D#":3,E:4,F:5,"F#":6,G:7,"G#":8,A:9,"A#":10,B:11};const m=note.match(/^([A-G]#?)(\d)$/);if(!m)return 440;const semi=notes[m[1]]+(parseInt(m[2])+1)*12;return 440*Math.pow(2,(semi-69)/12);}function playNote(freq,type,startTime,duration,vol=0.15,ctx=getCtx()){const osc=ctx.createOscillator();const gain=ctx.createGain();osc.type=type;osc.frequency.value=freq;gain.gain.setValueAtTime(vol,startTime);gain.gain.exponentialRampToValueAtTime(0.001,startTime+duration);osc.connect(gain);gain.connect(ctx.destination);osc.start(startTime);osc.stop(startTime+duration+0.05);}// F# major chiptune melody

function buildPool(mode){const pool=[];if(mode==="add"){for(let a=1;a<=15;a++)for(let b=1;b<=15;b++)pool.push({key:`add|${a}+${b}`,question:`${a} + ${b}`,answer:a+b});}else if(mode==="sub"){for(let a=2;a<=20;a++)for(let b=1;b<a;b++)pool.push({key:`sub|${a}-${b}`,question:`${a} − ${b}`,answer:a-b});}else if(mode==="mul"){for(let a=1;a<=10;a++)for(let b=1;b<=10;b++)pool.push({key:`mul|${a}x${b}`,question:`${a} × ${b}`,answer:a*b});}else if(mode==="div"){for(let b=2;b<=10;b++)for(let ans=1;ans<=10;ans++)pool.push({key:`div|${b*ans}/${b}`,question:`${b*ans} ÷ ${b}`,answer:ans});}return pool;}// ─── IndexedDB Stats Engine ───────────────────────────────────────────────────
const DB_NAME="unicorn_math",DB_VER=1,STORE="stats";let _db=null;function openDB(){if(_db)return Promise.resolve(_db);return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,DB_VER);req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE,{keyPath:"key"});req.onsuccess=e=>{_db=e.target.result;res(_db);};req.onerror=()=>rej();});}async function getStats(key){try{const db=await openDB();return new Promise(res=>{const tx=db.transaction(STORE,"readonly");const req=tx.objectStore(STORE).get(key);req.onsuccess=()=>res(req.result||{key,correct:0,wrong:0});req.onerror=()=>res({key,correct:0,wrong:0});});}catch(e){return{key,correct:0,wrong:0};}}async function recordAnswer(key,correct){try{const db=await openDB();const existing=await getStats(key);if(correct)existing.correct++;else existing.wrong++;const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).put(existing);// Update session cache immediately so next pick sees fresh weights
if(_sessionStatsMap){_sessionStatsMap[key]=existing;}}catch(e){}}async function getAllStats(){try{const db=await openDB();return new Promise(res=>{const req=db.transaction(STORE,"readonly").objectStore(STORE).getAll();req.onsuccess=()=>res(req.result||[]);req.onerror=()=>res([]);});}catch(e){return[];}}// ─── Weighted question picker ─────────────────────────────────────────────────
function scoreQuestion(stats){if(!stats||stats.correct+stats.wrong===0)return 8;if(stats.wrong>stats.correct)return 5;if(stats.wrong===stats.correct)return 2;return 1;}// Fisher-Yates shuffle
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rnd()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}// Session-level stats cache so we don't hit IDB every question
let _sessionStatsMap=null;let _sessionStatsMode=null;async function refreshSessionStats(){const all=await getAllStats();_sessionStatsMap={};all.forEach(s=>{_sessionStatsMap[s.key]=s;});}async function pickQuestion(mode,sessionSeen,trainingMode){// Reload stats cache when mode changes or first call
if(!_sessionStatsMap||_sessionStatsMode!==mode){await refreshSessionStats();_sessionStatsMode=mode;}const statsMap=_sessionStatsMap;const pool=buildPool(mode);// Candidates: training mode → only weak/unseen
let candidates=pool;if(trainingMode){const weak=pool.filter(q=>{const s=statsMap[q.key];return!s||s.correct+s.wrong===0||s.wrong>=s.correct;});if(weak.length>0)candidates=weak;}// Rolling session dedup: exclude already-seen this session
let unseen=candidates.filter(q=>!sessionSeen.has(q.key));if(unseen.length===0){sessionSeen.clear();unseen=[...candidates];}// Shuffle first to break any ordering bias
